server:
  port: 8080

spring:
  data:
    redis:
      host: localhost
      port: 6379
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: backend-route
              uri: http://localhost:8081
              predicates:
                - Path=/api/v1/**
              filters:
                - name: RateLimit
                  args:
                    capacity: 5
                    refill-tokens: 5
                    refill-period: 10s
            - id: downstream-b-route
              uri: http://localhost:8082
              predicates:
                - Path=/api/v2/**