server:
  port: 8080

spring:
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: backend-route
              uri: http://localhost:8081
              predicates:
                - Path=/api/v1/**
            - id: downstream-b-route
              uri: http://localhost:8082
              predicates:
                - Path=/api/v2/**
  data:
    redis:
      host: localhost
      port: 6379
